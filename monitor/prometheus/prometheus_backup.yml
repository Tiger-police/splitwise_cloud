global:
  scrape_interval: 15s # 每 15 秒拉取一次数据

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-metrics' # 监控云端和边端的 CPU、内存等基础指标
    static_configs:
      - targets:
        - '10.144.144.2:9100'  # 云端主节点
        - '10.144.144.3:9100'  # 📱 边缘节点 A

  - job_name: 'gpu-metrics' # 监控云端和边端的 NVIDIA GPU 指标
    static_configs:
      - targets:
        - '10.144.144.2:9400'  # 云端主节点
        - '10.144.144.3:9400'  # 📱 边缘节点 A