<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云边协同推理项目 - 全局监控中心</title>
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="project-logo">UI</div>
            <h1 class="project-title">边云中枢</h1>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchView('view-hardware', this)">📊 硬件监控大盘</li>
            <li class="nav-item" onclick="switchView('view-sandbox', this)">💬 协同推理沙盘</li>
        </ul>
    </div>

    <div class="main-layout">
        <header>
            <div class="sys-status">
                <div class="status-dot"></div>
                <span id="current-user-display">未登录</span>
                <button id="admin-panel-btn" class="btn-outline" style="display: none;" onclick="openAdminModal()">⚙️ 账号管理</button>
                <button class="btn-outline logout-btn" onclick="logout()">退出登入</button>
            </div>
        </header>

        <div id="view-hardware" class="view-section active">
            <div class="control-panel" style="background: var(--panel-bg); padding: 15px 20px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px;">
                <span style="color: #8b949e; font-weight: bold;">🖥️ 切换监控宿主机 :</span>
                <select id="custom-device-selector" onchange="switchGrafanaDevice()" style="background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 12px; border-radius: 5px; outline: none; cursor: pointer; min-width: 250px;">
                    <option value="">等待授权分配设备...</option>
                </select>
            </div>
            <iframe id="grafana-frame" src="" title="Grafana Monitor" style="border-radius: 8px; flex: 1;"></iframe>
        </div>
        <div id="view-sandbox" class="view-section">
            <div style="flex: 1; border: 2px dashed #30363d; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #8b949e; background: rgba(0,0,0,0.2);">
                <h2>沙盘核心交互区域 (待开发)</h2>
            </div>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <div style="text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;">云边协同调度枢纽</div>
            <div class="input-group">
                <label>身份凭证 (Username)</label>
                <input type="text" id="login-user" placeholder="仅支持管理员账号，如 admin" autocomplete="off">
            </div>
            <div class="input-group">
                <label>访问密钥 (Password)</label>
                <input type="password" id="login-pass" placeholder="输入密码" autocomplete="off">
            </div>
            <div id="login-error"></div>
            <button class="primary-btn" onclick="handleLogin()">授权登入</button>
        </div>
    </div>

    <div id="admin-modal-overlay">
        <div class="admin-modal">
            <div class="modal-header">
                <span>⚙️ 系统账号与权限管理</span>
                <button class="close-btn" onclick="closeAdminModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="admin-section">
                    <div class="user-table-container">
                        <table>
                            <thead><tr><th>账号名</th><th>角色</th><th>监控范围</th><th>操作</th></tr></thead>
                            <tbody id="user-table-body"></tbody>
                        </table>
                    </div>
                    <div class="add-user-form">
                        <h3 class="section-title">新增管理员账号</h3>
                        <div class="input-group" style="margin-bottom: 10px;"><label>账号名</label><input type="text" id="new-username" placeholder="如 userB"></div>
                        <div class="input-group" style="margin-bottom: 10px;"><label>密码</label><input type="password" id="new-password"></div>
                        <div class="input-group" style="margin-bottom: 15px;">
                            <label>账号角色</label>
                            <div id="admin-device-msg" style="display: block; color: var(--accent-green); font-size: 0.85rem; padding-top: 5px;">
                                🛡️ 云端后端当前只创建管理员本地账号，并自动授予全量设备监控权限
                            </div>
                        </div>
                        <button class="primary-btn" style="width: 100%;" onclick="createNewUser()">确认创建</button>
                        <div id="add-user-msg" style="font-size: 0.8rem; margin-top: 10px; text-align: center;"></div>
                    </div>
                </div>

                <hr style="border-color: var(--border-color); border-bottom: none; width: 100%; margin: 0 0 20px 0;">

                <div class="admin-section">
                    <div class="user-table-container">
                        <table>
                            <thead><tr><th>设备编号</th><th>展示名称</th><th>监控数据源 (IP:Port)</th><th>操作</th></tr></thead>
                            <tbody id="device-table-body"></tbody>
                        </table>
                    </div>
                    <div class="add-user-form">
                        <h3 class="section-title">录入新物理设备</h3>
                        <div class="input-group" style="margin-bottom: 10px;">
                            <label>设备编号 (英文/唯一)</label>
                            <input type="text" id="new-dev-id" placeholder="如 edge_C">
                        </div>

                        <div class="input-group" style="margin-bottom: 10px;">
                            <label>展示名称</label>
                            <input type="text" id="new-dev-name" placeholder="如 📱 边缘节点 C">
                        </div>

                        <div class="input-group" style="margin-bottom: 10px;">
                            <label>设备节点类型</label>
                            <select id="new-dev-type">
                                <option value="cloud">☁️ 云端节点</option>
                                <option value="edge" selected>📱 边缘节点</option>
                            </select>
                        </div>

                        <div class="input-group" style="margin-bottom: 15px;">
                            <label>Prometheus 源</label>
                            <input type="text" id="new-dev-value" placeholder="如 10.x.x.x:9100">
                        </div>

                        <button class="primary-btn" style="width: 100%; background: var(--edge-color); color:#000;" onclick="createNewDevice()">录入资产</button>
                        <div id="add-dev-msg" style="font-size: 0.8rem; margin-top: 10px; text-align: center;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/dashboard.js" defer></script>
</body>
</html>
